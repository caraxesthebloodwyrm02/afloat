name: CARAXES HASH Setup

"on":
  workflow_call:
    inputs:
      namespace:
        description: 'Workflow namespace for key derivation'
        required: false
        default: 'global'
        type: string
    outputs:
      run_key:
        description: 'Deterministic run key (16-char hex)'
        value: ${{ jobs.setup.outputs.run_key }}
      run_entropy:
        description: 'Full entropy seed for key derivation'
        value: ${{ jobs.setup.outputs.run_entropy }}
      secret_key_jwt:
        description: 'HMAC-hashed JWT secret key'
        value: ${{ jobs.setup.outputs.secret_key_jwt }}
      secret_key_prov:
        description: 'HMAC-hashed provenance secret key'
        value: ${{ jobs.setup.outputs.secret_key_prov }}
      secret_key_cron:
        description: 'HMAC-hashed cron secret key'
        value: ${{ jobs.setup.outputs.secret_key_cron }}
      secret_key_stripe:
        description: 'HMAC-hashed Stripe secret key'
        value: ${{ jobs.setup.outputs.secret_key_stripe }}
      secret_key_stripe_wh:
        description: 'HMAC-hashed Stripe webhook key'
        value: ${{ jobs.setup.outputs.secret_key_stripe_wh }}
      secret_key_upstash:
        description: 'HMAC-hashed Upstash token key'
        value: ${{ jobs.setup.outputs.secret_key_upstash }}
      secret_key_ollama:
        description: 'HMAC-hashed Ollama key'
        value: ${{ jobs.setup.outputs.secret_key_ollama }}
      secret_key_openai:
        description: 'HMAC-hashed OpenAI key'
        value: ${{ jobs.setup.outputs.secret_key_openai }}
      artifact_key:
        description: 'HMAC-hashed artifact key'
        value: ${{ jobs.setup.outputs.artifact_key }}
      temp_key:
        description: 'HMAC-hashed temp file key'
        value: ${{ jobs.setup.outputs.temp_key }}
      hash_chain:
        description: 'SHA256 hash chain for integrity'
        value: ${{ jobs.setup.outputs.hash_chain }}

permissions:
  contents: read

jobs:
  setup:
    name: CARAXES HASH v1 — ${{ inputs.namespace }}
    runs-on: ubuntu-latest
    outputs:
      run_key: ${{ steps.keys.outputs.RUN_KEY }}
      run_entropy: ${{ steps.entropy.outputs.RUN_ENTROPY }}
      secret_key_jwt: ${{ steps.keys.outputs.SECRET_KEY_JWT }}
      secret_key_prov: ${{ steps.keys.outputs.SECRET_KEY_PROV }}
      secret_key_cron: ${{ steps.keys.outputs.SECRET_KEY_CRON }}
      secret_key_stripe: ${{ steps.keys.outputs.SECRET_KEY_STRIPE }}
      secret_key_stripe_wh: ${{ steps.keys.outputs.SECRET_KEY_STRIPE_WH }}
      secret_key_upstash: ${{ steps.keys.outputs.SECRET_KEY_UPSTASH }}
      secret_key_ollama: ${{ steps.keys.outputs.SECRET_KEY_OLLAMA }}
      secret_key_openai: ${{ steps.keys.outputs.SECRET_KEY_OPENAI }}
      artifact_key: ${{ steps.keys.outputs.ARTIFACT_KEY }}
      temp_key: ${{ steps.keys.outputs.TEMP_KEY }}
      hash_chain: ${{ steps.chain.outputs.HASH_CHAIN }}
    steps:
      - name: CARAXES-HASH-v1 — Compute run entropy
        id: entropy
        run: |
          set -euo pipefail
          NAMESPACE="${{ inputs.namespace }}"
          RUN_ID="${{ github.run_id }}"
          ATTEMPT="${{ github.run_attempt }}"
          SHA="${{ github.sha }}"
          WORKFLOW="${{ github.workflow }}"
          ENTROPY_SEED="$(uuidgen 2>/dev/null || cat /proc/sys/kernel/random/uuid)"
          SYSTEM_RAND="$(head -c 32 /dev/urandom | base64 | tr -d '/+=')"
          NANOTIME="$(date +%s%N)"
          ENTROPY_INPUT="${RUN_ID}:${ATTEMPT}:${SHA}:${NAMESPACE}:${WORKFLOW}:${SYSTEM_RAND}:${NANOTIME}"
          RUN_ENTROPY="$(echo -n "$ENTROPY_INPUT" | sha256sum | awk '{print $1}')"
          RUN_KEY="$(echo -n "$RUN_ENTROPY" | sha256sum | cut -c1-16)"
          echo "RUN_ENTROPY=${RUN_ENTROPY}" >> "$GITHUB_OUTPUT"
          echo "RUN_KEY=${RUN_KEY}" >> "$GITHUB_OUTPUT"

      - name: CARAXES-HASH-v1 — Derive secret keys
        id: keys
        run: |
          set -euo pipefail
          RUN_KEY="${{ steps.entropy.outputs.RUN_KEY }}"
          derive_key() {
            local NAME="$1"
            echo "$NAME=$(echo -n "${NAME}:${RUN_KEY}" | openssl dgst -sha256 -hmac "$RUN_KEY" 2>/dev/null | awk '{print $2}' | cut -c1-16)"
          }
          derive_key jwt_secret >> "$GITHUB_OUTPUT"
          derive_key prov_secret >> "$GITHUB_OUTPUT"
          derive_key cron_secret >> "$GITHUB_OUTPUT"
          derive_key stripe_secret >> "$GITHUB_OUTPUT"
          derive_key stripe_wh >> "$GITHUB_OUTPUT"
          derive_key upstash_token >> "$GITHUB_OUTPUT"
          derive_key ollama_api >> "$GITHUB_OUTPUT"
          derive_key openai_api >> "$GITHUB_OUTPUT"
          derive_key artifact >> "$GITHUB_OUTPUT"
          echo "ARTIFACT_KEY=$(derive_key artifact)" >> "$GITHUB_OUTPUT"
          echo "TEMP_KEY=$(derive_key temp)" >> "$GITHUB_OUTPUT"

      - name: CARAXES-HASH-v1 — Hash chain integrity
        id: chain
        run: |
          set -euo pipefail
          RUN_KEY="${{ steps.entropy.outputs.RUN_KEY }}"
          RUN_ENTROPY="${{ steps.entropy.outputs.RUN_ENTROPY }}"
          TIMESTAMP="$(date +%s)"
          NONCE="$(head -c 16 /dev/urandom | base64 | tr -d '/+=')"
          CHAIN_INPUT="${RUN_KEY}:${RUN_ENTROPY}:${TIMESTAMP}:${NONCE}"
          HASH_CHAIN="$(echo -n "$CHAIN_INPUT" | sha256sum | awk '{print $1}')"
          echo "HASH_CHAIN=${HASH_CHAIN}" >> "$GITHUB_OUTPUT"
