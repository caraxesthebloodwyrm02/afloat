name: Security-${{ github.run_id }}-${{ github.run_attempt }}

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

concurrency:
  group: security-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  NODE_VERSION: '22'

jobs:
  # ── CARAXES-HASH-v1: Derive run key before any security scan ──────────────
  caraxes-hash:
    name: CARAXES HASH v1
    uses: ./.github/workflows/_caraxes-hash.yml
    with:
      namespace: security

  secret-hygiene:
    name: Secret hygiene
    runs-on: ubuntu-latest
    needs: caraxes-hash
    env:
      CARAXES_RUN_KEY: ${{ needs.caraxes-hash.outputs.run_key }}
    steps:
      - name: Validate CARAXES hash chain
        run: |
          echo "CARAXES-HASH-v1: RUN_KEY=$CARAXES_RUN_KEY"

      - name: Checkout with full history
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@47e7b7cd74f578e1e3145d48f669f22fd1330ca6 # v3.94.3
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || format('{0}~1', github.sha) }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    needs: caraxes-hash
    env:
      CARAXES_RUN_KEY: ${{ needs.caraxes-hash.outputs.run_key }}
    steps:
      - name: Validate CARAXES hash chain
        run: |
          echo "CARAXES-HASH-v1: RUN_KEY=$CARAXES_RUN_KEY"

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --omit=dev --audit-level=high

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    needs: caraxes-hash
    env:
      CARAXES_RUN_KEY: ${{ needs.caraxes-hash.outputs.run_key }}
    steps:
      - name: Validate CARAXES hash chain
        run: |
          echo "CARAXES-HASH-v1: RUN_KEY=$CARAXES_RUN_KEY"

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v3
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@c10b8064de6f491fea524254123dbe5e09572f13 # v3

      - name: Analyze
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v3
