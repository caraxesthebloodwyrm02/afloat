name: Security

run-name: Security - ${{ github.ref_name }} - ${{ github.sha }}

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"

permissions:
  contents: read
  security-events: write

env:
  NODE_VERSION: "22"

jobs:
  secret-hygiene:
    name: Secret hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with full history
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@6c64db94d5b2e09d7e0948fb6bd3166cc6fffbc7 # v3.94.0
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || format('{0}~1', github.sha) }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --omit=dev --audit-level=high

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@480db559a14342288b67e54bd959dd52dc3ee68f # v3
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@480db559a14342288b67e54bd959dd52dc3ee68f # v3

      - name: Analyze
        uses: github/codeql-action/analyze@480db559a14342288b67e54bd959dd52dc3ee68f # v3
