name: CI/CD

run-name: CI/CD - ${{ github.ref_name }} - ${{ github.sha }}

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  NODE_VERSION: "22"

defaults:
  run:
    shell: bash

jobs:
  quality:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run unit tests
        run: npm run test

      - name: Build application
        run: npm run build

  deploy_preview:
    name: Deploy preview to Vercel
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref != 'refs/heads/main'
    timeout-minutes: 20
    environment:
      name: preview
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Validate required Vercel secrets
        run: |
          set -euo pipefail
          for name in vercel_token VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required secret: $name"
              exit 1
            fi
          done

      - name: Pull Vercel preview environment
        run: npx --yes vercel@latest pull --yes --environment=preview --token="$vercel_token"

      - name: Build prebuilt artifacts
        run: npx --yes vercel@latest build --token="$vercel_token"

      - name: Deploy preview artifacts
        run: npx --yes vercel@latest deploy --prebuilt --token="$vercel_token"

  deploy_production:
    name: Deploy production to Vercel
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 20
    environment:
      name: production
    env:
      VERCEL_TOKEN: ${{ secrets.vercel_token }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Validate required Vercel secrets
        run: |
          set -euo pipefail
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required secret: $name"
              exit 1
            fi
          done

      - name: Pull Vercel production environment
        run: npx --yes vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build production artifacts
        run: npx --yes vercel@latest build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production artifacts
        run: npx --yes vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN"
