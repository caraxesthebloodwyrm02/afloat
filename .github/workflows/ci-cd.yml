name: CI/CD

run-name: CI/CD - ${{ github.ref_name }} - ${{ github.sha }} - ${{ github.run_attempt }}

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  NODE_VERSION: '22'
  VERCEL_CLI_VERSION: '50.23.2'

defaults:
  run:
    shell: bash

jobs:
  community-guardrails:
    name: Community guidelines
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate branch naming convention
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Branch: $BRANCH"
          if [[ ! "$BRANCH" =~ ^(feat|fix|chore|docs|style|refactor|test|perf|ci|revert)\/[a-z0-9-]+$ ]]; then
            echo "::error::Branch name '$BRANCH' does not follow convention. Use: <type>/<description>"
            echo "Valid types: feat, fix, chore, docs, style, refactor, test, perf, ci, revert"
            exit 1
          fi
          echo "Branch naming: PASS"

      - name: Validate PR description presence
        run: |
          BODY="${{ github.event.pull_request.body }}"
          if [ -z "$BODY" ] || [ "$BODY" == "null" ]; then
            echo "::error::Pull request body is empty. Include: Summary, Root Cause, Verification checklist."
            exit 1
          fi
          # Check for required sections
          if ! echo "$BODY" | grep -qi "summary"; then
            echo "::error::PR body must include a 'Summary' section."
            exit 1
          fi
          if ! echo "$BODY" | grep -qi "verification"; then
            echo "::warning::PR body should include a 'Verification' checklist."
          fi
          echo "PR description: PASS"

      - name: Check for debug code in source
        run: |
          # Scan src/ for debug artifacts
          DEBUG_PATTERNS=$(grep -rEn "console\.(log|debug)\(|debugger;?|\.only\(|\.skip\(" src/ --include="*.ts" --include="*.tsx" 2>/dev/null | grep -v "// debug\|// debug\|test\|spec" || true)
          if [ -n "$DEBUG_PATTERNS" ]; then
            echo "::error::Debug code found in src/:"
            echo "$DEBUG_PATTERNS"
            exit 1
          fi
          echo "Debug code check: PASS"

      - name: Check coverage thresholds
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            LINES=$(node -e "console.log(JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json')).total.lines.pct)" 2>/dev/null)
            if [ -n "$LINES" ] && (( $(echo "$LINES < 68" | bc -l) )); then
              echo "::error::Line coverage ($LINES%) is below threshold (68%)."
              exit 1
            fi
            echo "Coverage: $LINES% (threshold: 68%)"
          else
            echo "::warning::No coverage summary found — skipping threshold check."
          fi

  quality:
    name: Lint, typecheck, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [community-guardrails]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript typecheck
        run: npm run typecheck

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Build application
        run: npm run build

      - name: Upload CI artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-artifacts-${{ github.sha }}-r${{ github.run_attempt }}
          path: |
            .next/BUILD_ID
            .next/build-manifest.json
            coverage/coverage-summary.json
            coverage/lcov.info
          if-no-files-found: error
          retention-days: 3

  deploy_preview:
    name: Deploy preview to Vercel
    runs-on: ubuntu-latest
    needs: [community-guardrails, quality]
    if: github.event_name == 'push' && github.ref != 'refs/heads/main' && github.actor != 'dependabot[bot]'
    timeout-minutes: 20
    environment:
      name: preview
    env:
      VERCEL_TOKEN: ${{ secrets.vercel_token }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Validate required Vercel secrets
        run: |
          set -euo pipefail
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required secret: $name"
              exit 1
            fi
          done

      - name: Pull Vercel preview environment
        run: npx --yes vercel@${VERCEL_CLI_VERSION} pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build prebuilt artifacts
        run: npx --yes vercel@${VERCEL_CLI_VERSION} build --token="$VERCEL_TOKEN"

      - name: Deploy preview artifacts
        run: npx --yes vercel@${VERCEL_CLI_VERSION} deploy --prebuilt --token="$VERCEL_TOKEN"

  deploy_production:
    name: Deploy production to Vercel
    runs-on: ubuntu-latest
    needs: [community-guardrails, quality]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20
    environment:
      name: production
    env:
      VERCEL_TOKEN: ${{ secrets.vercel_token }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Validate required Vercel secrets
        run: |
          set -euo pipefail
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required secret: $name"
              exit 1
            fi
          done

      - name: Pull Vercel production environment
        run: npx --yes vercel@${VERCEL_CLI_VERSION} pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build production artifacts
        run: npx --yes vercel@${VERCEL_CLI_VERSION} build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production artifacts
        run: npx --yes vercel@${VERCEL_CLI_VERSION} deploy --prebuilt --prod --token="$VERCEL_TOKEN"
