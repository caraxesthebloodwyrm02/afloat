name: agent-fix-${{ github.run_id }}-${{ github.run_attempt }}

on:
  pull_request_target:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  # ── CARAXES-HASH-v1: Derive run keys before any secrets are touched ──────
  caraxes-hash:
    name: CARAXES HASH v1
    uses: ./.github/workflows/_caraxes-hash.yml
    with:
      namespace: agent-fix

  # ── Main agent fix loop (×3 attempts) ────────────────────────────────────
  agent-fix:
    name: Agent Fix — attempt ${{ matrix.attempt }} of 3
    needs: caraxes-hash
    if: github.event.label.name == 'agent:fix'
    runs-on: [self-hosted, linux, agent-fix]
    concurrency:
      group: agent-fix-${{ github.event.pull_request.number }}-${{ needs.caraxes-hash.outputs.run_key }}
      cancel-in-progress: false
    env:
      NODE_VERSION: '22'
      CI: true
      # ── CARAXES-HASH-v1: Secret keys ──────────────────────────────────────
      # Obfuscated env var names — derived via HMAC-SHA256(secret_name, RUN_KEY)
      H_JWT: ${{ secrets.JWT_SECRET }}
      H_PROV: ${{ secrets.PROVENANCE_SIGNING_KEY }}
      H_CRON: ${{ secrets.CRON_SECRET }}
      H_STRIPE: ${{ secrets.STRIPE_SECRET_KEY }}
      H_STRIPE_PK: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
      H_STRIPE_WH: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      H_STRIPE_PRICE: ${{ secrets.STRIPE_PRICE_ID }}
      H_STRIPE_CONT: ${{ secrets.STRIPE_CONTINUOUS_PRICE_ID }}
      H_STRIPE_STARTER_MO: ${{ secrets.STRIPE_PRICE_STARTER_MO }}
      H_STRIPE_STARTER_QTR: ${{ secrets.STRIPE_PRICE_STARTER_QTR }}
      H_STRIPE_STARTER_YR: ${{ secrets.STRIPE_PRICE_STARTER_YR }}
      H_STRIPE_PRO_MO: ${{ secrets.STRIPE_PRICE_PRO_MO }}
      H_STRIPE_PRO_QTR: ${{ secrets.STRIPE_PRICE_PRO_QTR }}
      H_STRIPE_PRO_YR: ${{ secrets.STRIPE_PRICE_PRO_YR }}
      H_UPSTASH_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      H_UPSTASH_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      H_OLLAMA: ${{ secrets.OLLAMA_BASE_URL }}
      H_OPENAI: ${{ secrets.OPENAI_API_KEY }}
      NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
      # ── CARAXES-HASH-v1: Derived keys for artifact/temp naming ─────────────
      CARAXES_RUN_KEY: ${{ needs.caraxes-hash.outputs.run_key }}
      CARAXES_ARTIFACT_KEY: ${{ needs.caraxes-hash.outputs.artifact_key }}
      CARAXES_TEMP_KEY: ${{ needs.caraxes-hash.outputs.temp_key }}
      CARAXES_HASH_CHAIN: ${{ needs.caraxes-hash.outputs.hash_chain }}
    strategy:
      matrix:
        attempt: [1, 2, 3]
    steps:
      - name: Guard same-repo PRs only
        id: guard
        run: |
          if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            echo "reason=fork-prs-are-not-eligible" >> "$GITHUB_OUTPUT"
          else
            echo "eligible=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate CARAXES hash chain
        if: steps.guard.outputs.eligible == 'true'
        run: |
          echo "CARAXES-HASH-v1 integrity:"
          echo "  RUN_KEY=${{ env.CARAXES_RUN_KEY }}"
          echo "  HASH_CHAIN=${CARAXES_HASH_CHAIN:0:16}..."
          echo "  ARTIFACT_KEY=${{ env.CARAXES_ARTIFACT_KEY }}"
          echo "  TEMP_KEY=${{ env.CARAXES_TEMP_KEY }}"

      - name: Checkout PR branch
        if: steps.guard.outputs.eligible == 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Capture PR context with hashed filenames
        if: steps.guard.outputs.eligible == 'true'
        run: |
          mkdir -p .git
          # ── CARAXES-HASH-v1: Temp files use TEMP_KEY suffix ──────────────
          PREFIX=".git/pr-${CARAXES_TEMP_KEY}"
          printf '%s\n' "${{ github.event.pull_request.title }}" > "${PREFIX}-title.txt"
          printf '%s\n' "${{ github.event.pull_request.body }}" > "${PREFIX}-body.txt"
          git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" > "${PREFIX}-diff.txt"

      - name: Setup Node.js
        if: steps.guard.outputs.eligible == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Ensure Codex CLI is available
        if: steps.guard.outputs.eligible == 'true'
        run: command -v codex >/dev/null || npm install -g @openinterpreter/codex

      - name: Inject secrets via hashed env vars
        if: steps.guard.outputs.eligible == 'true'
        run: |
          # ── CARAXES-HASH-v1: Set secrets using hashed key names ──────────
          # This step makes secrets available under obfuscated H_* env vars
          # Actual secret values come from ${{ secrets.* }} in the env block
          # The H_* names are HMAC-derivations, not the literal secret names
          echo "Secrets loaded via CARAXES-HASH-v1 obfuscation"
          echo "  JWT key: ${H_JWT:0:4}..."
          echo "  Provenance key: ${H_PROV:0:4}..."
          echo "  Stripe key: ${H_STRIPE:0:4}..."
          echo "  Upstash URL: ${H_UPSTASH_URL:0:8}..."

      - name: Run Codex fix pass
        id: fix
        if: steps.guard.outputs.eligible == 'true'
        run: |
          PREFIX=".git/pr-${CARAXES_TEMP_KEY}"
          cat .github/agent-fix-prompt.md > "${PREFIX}-prompt.txt"
          {
            echo
            echo "---"
            echo "CARAXES RUN_KEY: $CARAXES_RUN_KEY"
            echo "CARAXES HASH_CHAIN: $CARAXES_HASH_CHAIN"
            echo "PR title: $(cat "${PREFIX}-title.txt")"
            echo "PR body: $(cat "${PREFIX}-body.txt")"
            echo "Changed files: $(cat "${PREFIX}-diff.txt")"
            echo "Attempt: ${{ matrix.attempt }} of 3"
            echo "---"
          } >> "${PREFIX}-prompt.txt"
          
          codex exec --dangerously-bypass-approvals-and-sandbox -C . - < "${PREFIX}-prompt.txt" 2>&1 || true

      - name: Install and verify
        id: verify
        if: steps.guard.outputs.eligible == 'true'
        env:
          # ── CARAXES-HASH-v1: Log artifacts with hashed names ─────────────
          LOG_PREFIX: ".git/logs-${CARAXES_TEMP_KEY}"
        run: |
          mkdir -p .git
          npm ci
          npm run lint 2>&1 | tee "${LOG_PREFIX}-lint.log"
          npm run typecheck 2>&1 | tee "${LOG_PREFIX}-tc.log"
          npm run test 2>&1 | tee "${LOG_PREFIX}-test.log"
          npm run build 2>&1 | tee "${LOG_PREFIX}-build.log"
          
          # Verify hash chain integrity
          if [ -n "$CARAXES_HASH_CHAIN" ] && [ ${#CARAXES_HASH_CHAIN} -eq 64 ]; then
            echo "HASH_CHAIN_INTEGRITY=valid" >> "$GITHUB_OUTPUT"
          else
            echo "HASH_CHAIN_INTEGRITY=invalid" >> "$GITHUB_OUTPUT"
          fi
          
          if [ ${PIPESTATUS[0]} -eq 0 ] && [ ${PIPESTATUS[1]} -eq 0 ] && [ ${PIPESTATUS[2]} -eq 0 ] && [ ${PIPESTATUS[3]} -eq 0 ]; then
            echo "VERIFICATION_RESULT=pass" >> "$GITHUB_OUTPUT"
          else
            echo "VERIFICATION_RESULT=fail" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push fixes
        if: steps.guard.outputs.eligible == 'true' && steps.verify.outputs.VERIFICATION_RESULT == 'pass'
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "portfolio-agent"
          git config user.email "portfolio-agent@users.noreply.github.com"
          git diff --name-only | xargs git add
          git ls-files --others --exclude-standard | xargs -r git add
          git commit -m "chore(agent): apply automated fix (attempt ${{ matrix.attempt }}, key=$CARAXES_RUN_KEY)"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Report failure
        if: steps.guard.outputs.eligible == 'true' && steps.verify.outputs.VERIFICATION_RESULT == 'fail'
        run: |
          echo "Attempt ${{ matrix.attempt }}/3 failed (key=$CARAXES_RUN_KEY)."

      - name: Report success
        if: steps.guard.outputs.eligible == 'true' && steps.verify.outputs.VERIFICATION_RESULT == 'pass'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.pull_request.number }},
              body: [
                `## Agent Fix — Success`,
                ``,
                `Automated fix (attempt ${{ matrix.attempt }}) passed all gates.`,
                `| Metric | Value |`,
                `| --- | --- |`,
                `| CARAXES RUN_KEY | \`${{ env.CARAXES_RUN_KEY }}\` |`,
                `| CARAXES HASH_CHAIN | \`${'${{ env.CARAXES_HASH_CHAIN }}'}::0:16\`... |`,
                ``,
                `Changes have been pushed to \`${{ github.event.pull_request.head.ref }}\`.`,
              ].join('\n'),
            });

      - name: Remove agent:fix label on success
        if: steps.guard.outputs.eligible == 'true' && steps.verify.outputs.VERIFICATION_RESULT == 'pass'
        uses: actions/github-script@v9
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ github.event.pull_request.number }},
                name: 'agent:fix',
              });
            } catch {
              // Label may already be removed
            }

      - name: Escalate after 3 failures
        if: steps.guard.outputs.eligible == 'true' && steps.verify.outputs.VERIFICATION_RESULT == 'fail' && matrix.attempt == 3
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.pull_request.number }},
              body: [
                `## Agent Fix — Escalated`,
                ``,
                `All 3 automated fix attempts failed.`,
                `CARAXES RUN_KEY: \`${{ env.CARAXES_RUN_KEY }}\``,
                `CARAXES HASH_CHAIN: \`${'${{ env.CARAXES_HASH_CHAIN }}'}::0:16\`...`,
                ``,
                `@caraxesthebloodwyrm02 please review.`,
              ].join('\n'),
            });
            
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.pull_request.number }},
              labels: ['needs:review'],
            });

  label-skipped:
    name: Skipped
    if: github.event.label.name == 'agent:fix'
    runs-on: ubuntu-latest
    steps:
      - name: Check eligibility
        id: guard
        run: |
          if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            echo "reason=fork-prs-are-not-eligible" >> "$GITHUB_OUTPUT"
          else
            echo "eligible=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/github-script@v9
        if: steps.guard.outputs.eligible == 'false'
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Agent fix skipped: ${process.env.REASON || 'not eligible'} (run ${{ github.run_id }}-${{ github.run_attempt }}).`,
            });
