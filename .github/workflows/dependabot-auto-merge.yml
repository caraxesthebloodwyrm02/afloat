name: Dependabot Auto-Merge-${{ github.run_id }}-${{ github.run_attempt }}

"on":
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: dependabot-auto-merge-${{ github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── CARAXES-HASH-v1: Derive run key for Dependabot merge ─────────────────
  caraxes-hash:
    name: CARAXES HASH v1
    uses: ./.github/workflows/_caraxes-hash.yml
    with:
      namespace: dependabot

  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    needs: caraxes-hash
    env:
      CARAXES_RUN_KEY: ${{ needs.caraxes-hash.outputs.run_key }}
    steps:
      - name: Validate CARAXES hash chain
        run: |
          echo "CARAXES-HASH-v1: RUN_KEY=$CARAXES_RUN_KEY"

      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge patch and minor updates
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
